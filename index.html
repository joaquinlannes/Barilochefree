<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BarilocheFree | Experiencias reales</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* NAV */
header {
  position: fixed;
  width: 100%;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(12px);
  z-index: 1000;
}

.logo {
  font-weight: 900;
  letter-spacing: 3px;
}

/* HERO PARALLAX */
.hero {
  height: 100vh;
  background: url('TU-FOTO-PORTADA.jpg') center/cover no-repeat fixed;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero h1 {
  font-size: 3em;
  max-width: 700px;
  animation: fadeIn 2s ease;
}

.btn {
  margin-top: 20px;
  padding: 15px 30px;
  background: white;
  color: black;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* ANIMACIONES */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(30px);}
  to {opacity: 1; transform: translateY(0);}
}

/* SECCIONES */
.section {
  padding: 100px 20px;
  text-align: center;
}

/* TEXTO IMPACTO */
.big-text {
  font-size: 2.5em;
  font-weight: 900;
}

/* GALERÍA PRO */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 15px;
}

.gallery img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  transition: 0.4s;
}

.gallery img:hover {
  transform: scale(1.08);
  filter: brightness(1.2);
}

/* CTA */
.cta {
  background: white;
  color: black;
  padding: 80px 20px;
}

.cta h2 {
  font-size: 2em;
}

/* BOTONES FLOTANTES PRO */
.float-btn {
  position: fixed;
  right: 20px;
  bottom: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.float-btn a {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 24px;
  text-decoration: none;
  transition: 0.3s;
}

.float-btn a:hover {
  transform: scale(1.15);
}

.whatsapp {
  background: #25D366;
}

.instagram {
  background: radial-gradient(circle at 30% 30%, #feda75, #d62976, #962fbf);
}

/* FOOTER */
footer {
  padding: 40px;
  text-align: center;
  opacity: 0.6;
}
</style>
</head>

<body>

<header>
  <div class="logo">BARILOCHEFREE</div>
</header>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Bariloche como no aparece en Google</h1>
    <a class="btn" href="#galeria">Explorar</a>
  </div>
</section>

<!-- FRASE -->
<section class="section">
  <div class="big-text">No es turismo. Es vivir Bariloche.</div>
</section>

<!-- GALERÍA -->
<section id="galeria" class="section">
  <h2>Experiencias reales</h2>

  <div class="gallery">
    <img src="FOTO1.jpg">
    <img src="FOTO2.jpg">
    <img src="FOTO3.jpg">
    <img src="FOTO4.jpg">
    <img src="FOTO5.jpg">
    <img src="FOTO6.jpg">
  </div>
</section>

<!-- CTA FINAL -->
<section class="cta">
  <h2>Viví la experiencia</h2>
  <a class="btn" href="https://wa.me/5492944204802">Reservar ahora</a>
</section>

<footer>
  <p>© BarilocheFree</p>
</footer>

<!-- BOTONES -->
<div class="float-btn">
  <a class="instagram" href="https://instagram.com/barilochefree" target="_blank">📷</a>
  <a class="whatsapp" href="https://wa.me/5492944204801" target="_blank">💬</a>
</div>

</body>
</html>
