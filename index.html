<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bariloche Free</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #000;
  color: #fff;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
              url('IMG_0364.jpeg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero h1 {
  font-size: 60px;
  letter-spacing: 6px;
  animation: fadeIn 2s ease;
}

/* GALERÍA */
.galeria {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 40px;
}

.galeria img {
  width: 100%;
  border-radius: 12px;
  transition: transform 0.4s, filter 0.4s;
}

.galeria img:hover {
  transform: scale(1.07);
  filter: brightness(1.2);
}

/* SECCIÓN TEXTO */
.section {
  padding: 60px 20px;
  text-align: center;
}

.section h2 {
  font-size: 32px;
  margin-bottom: 20px;
}

/* ANIMACIÓN */
.hidden {
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

/* BOTÓN WHATSAPP */
.wsp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  font-size: 22px;
  text-decoration: none;
  color: white;
  box-shadow: 0 0 15px rgba(0,0,0,0.6);
}

/* RESPONSIVE */
@media(max-width:600px){
  .hero h1 {
    font-size: 35px;
  }
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>BARILOCHE FREE</h1>
</section>

<!-- TEXTO -->
<section class="section hidden">
  <h2>Explorá Bariloche como nunca</h2>
  <p>Experiencias únicas, paisajes épicos y aventuras reales.</p>
</section>

<!-- GALERÍA -->
<section class="galeria">
  <img src="IMG_0381.jpeg">
  <img src="IMG_0455.jpeg">
  <img src="IMG_0463.jpeg">
  <img src="IMG_0664.jpeg">
  <img src="IMG_1083.jpeg">
</section>

<!-- WHATSAPP -->
<a class="wsp" href="https://wa.me/549XXXXXXXXXX" target="_blank">💬</a>

<script>
// animación al scrollear
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

document.querySelectorAll('.hidden').forEach(el => observer.observe(el));
</script>

</body>
</html>
