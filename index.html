<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bariloche Free</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,Helvetica,sans-serif;background:#000;color:#fff}

/* NAV */
header{
  position:fixed;top:0;width:100%;
  padding:20px 40px;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
  z-index:1000;
}
header h1{letter-spacing:3px;font-size:16px}
header a{color:#fff;text-decoration:none;margin-left:25px;font-size:14px}

/* HERO */
.hero{
  height:100vh;
  background:url('https://raw.githubusercontent.com/Barilochefree/barilochefree/main/IMG_0364.jpeg') center/cover no-repeat;
  display:flex;align-items:center;justify-content:center;text-align:center;
}
.hero h2{
  font-size:50px;
  letter-spacing:4px;
  background:rgba(0,0,0,0.4);
  padding:15px 25px;
}

/* SECCIONES */
.section{padding:100px 30px;text-align:center}
.section h2{margin-bottom:30px;letter-spacing:3px}

/* EXPERIENCIAS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}
.card{position:relative;overflow:hidden}
.card img{width:100%;height:350px;object-fit:cover}
.card .info{
  position:absolute;bottom:0;width:100%;
  padding:20px;
  background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
}

/* GALERIA */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}
.gallery img{
  width:100%;height:300px;
  object-fit:cover;
  cursor:pointer;
  transition:0.4s;
}
.gallery img:hover{transform:scale(1.05)}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
}
.lightbox img{
  max-width:90%;
  max-height:90%;
}
.lightbox.active{display:flex}

/* ESENCIA */
.quote{
  font-size:22px;
  max-width:700px;
  margin:auto;
  opacity:0.7;
}

/* CTA */
.cta a{
  display:inline-block;
  margin-top:20px;
  padding:15px 25px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
}
.cta a:hover{
  background:#fff;
  color:#000;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:14px 18px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
}

/* ANIMACIONES */
.fade{opacity:0;transform:translateY(40px);transition:1s}
.fade.show{opacity:1;transform:translateY(0)}

</style>
</head>

<body>

<header>
  <h1>BARILOCHE FREE</h1>
  <div>
    <a href="#exp">Experiencias</a>
    <a href="#gal">Galería</a>
    <a href="#esencia">Esencia</a>
    <a href="#contacto">Contacto</a>
  </div>
</header>

<section class="hero">
  <h2>EXPERIENCIAS REALES</h2>
</section>

<section id="exp" class="section fade">
  <h2>Experiencias</h2>
  <div class="cards">
    <div class="card">
      <img src="https://raw.githubusercontent.com/Barilochefree/barilochefree/main/IMG_0381.jpeg">
      <div class="info">Aventura en montaña</div>
    </div>
    <div class="card">
      <img src="https://raw.githubusercontent.com/Barilochefree/barilochefree/main/IMG_0455.jpeg">
      <div class="info">Naturaleza pura</div>
    </div>
    <div class="card">
      <img src="https://raw.githubusercontent.com/Barilochefree/barilochefree/main/IMG_0463.jpeg">
      <div class="info">Momentos únicos</div>
    </div>
  </div>
</section>

<section id="gal" class="section fade">
  <h2>Galería</h2>
  <div class="gallery">

    <img src="https://raw.githubusercontent.com/Barilochefree/barilochefree/main/IMG_0364.jpeg">
    <img src="https://raw.githubusercontent.com/Barilochefree/barilochefree/main/IMG_0664.jpeg">
    <img src="https://raw.githubusercontent.com/Barilochefree/barilochefree/main/IMG_1083.jpeg">
    <img src="https://raw.githubusercontent.com/Barilochefree/barilochefree/main/IMG_6857.png">
    <img src="https://raw.githubusercontent.com/Barilochefree/barilochefree/main/IMG_6858.png">
    <img src="https://raw.githubusercontent.com/Barilochefree/barilochefree/main/IMG_6859.png">
    <img src="https://raw.githubusercontent.com/Barilochefree/barilochefree/main/IMG_6861.png">
    <img src="https://raw.githubusercontent.com/Barilochefree/barilochefree/main/IMG_6862.png">
    <img src="https://raw.githubusercontent.com/Barilochefree/barilochefree/main/IMG_6863.png">
    <img src="https://raw.githubusercontent.com/Barilochefree/barilochefree/main/IMG_6864.png">

  </div>
</section>

<section id="esencia" class="section fade">
  <h2>Esencia</h2>
  <p class="quote">
    No es turismo. Es vivir Bariloche de verdad.
  </p>
</section>

<section id="contacto" class="section cta fade">
  <h2>Contacto</h2>
  <a href="#">Reservar experiencia</a>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img src="" id="lightbox-img">
</div>

<!-- WHATSAPP (CAMBIAR NUMERO) -->
<a class="whatsapp" href="https://wa.me/549XXXXXXXXXX" target="_blank">
  WhatsApp
</a>

<script>
// LIGHTBOX
const images = document.querySelectorAll('.gallery img');
const lightbox = document.getElementById('lightbox');
const lightImg = document.getElementById('lightbox-img');

images.forEach(img=>{
  img.addEventListener('click',()=>{
    lightbox.classList.add('active');
    lightImg.src = img.src;
  });
});

lightbox.addEventListener('click',()=>{
  lightbox.classList.remove('active');
});

// ANIMACIONES SCROLL
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', ()=>{
  faders.forEach(el=>{
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
