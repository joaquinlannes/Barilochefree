<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freeride Bariloche</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('IMG_8273.JPG') center/cover no-repeat;
  display: flex;
  align-items: flex-end;
  padding: 30px;
}

.hero h1 {
  font-size: 2.5em;
  font-weight: 900;
}

.btn {
  background: #ff3c00;
  padding: 12px 20px;
  border-radius: 25px;
  color: white;
  text-decoration: none;
  display: inline-block;
  margin-top: 15px;
}

/* SECCIONES */
.section {
  padding: 80px 20px;
  text-align: center;
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s ease;
}

.section.visible {
  opacity: 1;
  transform: translateY(0);
}

/* GALERIA */
.gallery {
  display: grid;
  grid-template-columns: 1fr;
}

.gallery img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  transition: transform 0.6s ease;
}

/* HOVER EFECTO */
.gallery img:hover {
  transform: scale(1.08);
}

/* DESKTOP */
@media (min-width: 768px) {
  .gallery {
    grid-template-columns: repeat(3, 1fr);
  }

  .gallery img {
    height: 400px;
  }

  .hero h1 {
    font-size: 4em;
  }
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>BARILOCHE FREERIDE</h1>
    <p>No vengas a mirar. Vení a vivirlo.</p>
    <a class="btn" href="https://wa.me/TUNUMERO">Reservar</a>
  </div>
</div>

<!-- FRASE -->
<div class="section">
  <h2>Esto no es turismo. Es experiencia.</h2>
</div>

<!-- GALERIA -->
<div class="gallery">
  <img src="IMG_8273.JPG">
  <img src="IMG_8274.JPG">
  <img src="IMG_8275.JPG">
  <img src="IMG_8276.JPG">
  <img src="IMG_8277.JPG">
  <img src="IMG_8278.JPG">
</div>

<!-- CTA -->
<div class="section">
  <h2>¿Listo para vivirlo?</h2>
  <a class="btn" href="https://instagram.com/TUUSUARIO">Ver Instagram</a>
</div>

<script>

/* ANIMACIÓN AL SCROLL */
const sections = document.querySelectorAll('.section');

window.addEventListener('scroll', () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      sec.classList.add('visible');
    }
  });
});

</script>

</body>
</html>
