<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BarilocheFree</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: black;
  color: white;
}

/* NAV */
header {
  position: fixed;
  width: 100%;
  padding: 20px;
  display: flex;
  justify-content: center;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

.logo {
  font-weight: 900;
  letter-spacing: 3px;
}

/* HERO BOSQUE (EL QUE TE GUSTABA) */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1500&q=80') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero h1 {
  font-size: 3em;
  max-width: 700px;
}

.btn {
  margin-top: 20px;
  padding: 15px 30px;
  background: white;
  color: black;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* SECCIONES */
.section {
  padding: 80px 20px;
  text-align: center;
}

/* GALERÍA PRO */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 10px;
}

.gallery img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  transition: 0.4s;
}

.gallery img:hover {
  transform: scale(1.08);
}

/* BOTONES FLOTANTES */
.float-btn {
  position: fixed;
  right: 20px;
  bottom: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.float-btn a {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.float-btn a:hover {
  transform: scale(1.15);
}

.whatsapp {
  background: #25D366;
}

.instagram {
  background: radial-gradient(circle at 30% 30%, #feda75, #d62976, #962fbf);
}

/* FOOTER */
footer {
  padding: 40px;
  text-align: center;
  opacity: 0.6;
}
</style>
</head>

<body>

<header>
  <div class="logo">BARILOCHEFREE</div>
</header>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Bariloche como no aparece en Google</h1>
    <a class="btn" href="#galeria">Explorar</a>
  </div>
</section>

<!-- FRASE -->
<section class="section">
  <h2>No es turismo. Es vivir Bariloche.</h2>
</section>

<!-- GALERÍA (FUNCIONA SEGURO) -->
<section id="galeria" class="section">
  <div class="gallery">

    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80">
    <img src="https://images.unsplash.com/photo-1493244040629-496f6d136cc3?auto=format&fit=crop&w=800&q=80">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80">
    <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=800&q=80">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=800&q=80">
    <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=800&q=80">

  </div>
</section>

<!-- CTA -->
<section class="section">
  <h2>Reservá tu experiencia</h2>
  <a class="btn" href="https://wa.me/5492944204802">Hablar por WhatsApp</a>
</section>

<footer>
  <p>© BarilocheFree</p>
</footer>

<!-- BOTONES -->
<div class="float-btn">
  <a class="instagram" href="https://instagram.com/barilochefree" target="_blank">📷</a>
  <a class="whatsapp" href="https://wa.me/5492944204802" target="_blank">💬</a>
</div>

</body>
</html>
