<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bariloche Free</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: #0a0a0a;
      color: white;
    }

    header {
      height: 100vh;
      background: url('IMG_0364.jpeg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    header h1 {
      font-size: 50px;
      letter-spacing: 4px;
      background: rgba(0,0,0,0.5);
      padding: 20px;
    }

    .galeria {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 20px;
    }

    .galeria img {
      width: 100%;
      border-radius: 10px;
      transition: transform 0.3s;
    }

    .galeria img:hover {
      transform: scale(1.05);
    }

    .btn-wsp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px 18px;
      border-radius: 50%;
      font-size: 20px;
      text-decoration: none;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 30px;
      }

      .galeria {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>BARILOCHE FREE</h1>
  </header>

  <section class="galeria">
    <img src="IMG_0381.jpeg">
    <img src="IMG_0455.jpeg">
    <img src="IMG_0463.jpeg">
    <img src="IMG_0664.jpeg">
    <img src="IMG_1083.jpeg">
  </section>

  <!-- BOTÓN WHATSAPP -->
  <a class="btn-wsp" href="https://wa.me/5492944204802" target="_blank">
    💬
  </a>

</body>
</html>
