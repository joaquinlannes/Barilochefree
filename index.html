<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aventura Off Road</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#fff}

/* HERO */
.hero{
  height:60vh;
  background:url('https://raw.githubusercontent.com/Barilochefree/barilochefree/main/IMG_0381.jpeg') center/cover;
  display:flex;align-items:center;justify-content:center;
}
.hero h1{
  background:rgba(0,0,0,0.6);
  padding:15px;
}

/* CONTENIDO */
.container{padding:30px;max-width:500px;margin:auto}
.price{font-size:28px;margin:10px 0}
label{display:block;margin-top:15px;font-size:14px}
input,select{
  width:100%;
  padding:10px;
  margin-top:5px;
  background:#111;
  border:1px solid #333;
  color:#fff;
}

/* BOTON */
.btn{
  margin-top:25px;
  width:100%;
  padding:15px;
  background:#25D366;
  border:none;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

.total{
  margin-top:15px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>AVENTURA OFF ROAD</h1>
</div>

<div class="container">

  <div class="price">$45.000 por persona</div>

  <p>Incluye guía + traslado + fotos</p>

  <p style="color:#0f0;">🔥 Quedan pocos lugares esta semana</p>

  <label>Fecha</label>
  <input type="date" id="fecha">

  <label>Personas</label>
  <select id="personas">
    <option value="1">1 persona</option>
    <option value="2">2 personas</option>
    <option value="3">3 personas</option>
    <option value="4">4 personas</option>
  </select>

  <div class="total" id="total">
    Total: $45.000
  </div>

  <button class="btn" onclick="reservar()">
    Reservar por WhatsApp
  </button>

</div>

<script>
const precio = 45000;

const personasSelect = document.getElementById('personas');
const totalDiv = document.getElementById('total');

personasSelect.addEventListener('change', actualizarTotal);

function actualizarTotal(){
  const personas = personasSelect.value;
  const total = precio * personas;
  totalDiv.innerText = "Total: $" + total.toLocaleString();
}

function reservar(){
  const fecha = document.getElementById('fecha').value;
  const personas = personasSelect.value;
  const total = precio * personas;

  if(!fecha){
    alert("Elegí una fecha");
    return;
  }

  const mensaje = `Hola! Quiero reservar Aventura Off Road
Fecha: ${fecha}
Personas: ${personas}
Total: $${total}`;

  const url = "https://wa.me/549XXXXXXXXXX?text=" + encodeURIComponent(mensaje);

  window.open(url, '_blank');
}
</script>

</body>
</html>
